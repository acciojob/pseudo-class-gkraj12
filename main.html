 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            margin: 20px;

        }
        #container::before{
            content: "Special Text Before";
            color: #f00;
            font-size: 20px;
        }
        #container::after{
            content: "Special Text After";
            color: #f00;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="container">This is the main container content.</div>
</body>
</html>
